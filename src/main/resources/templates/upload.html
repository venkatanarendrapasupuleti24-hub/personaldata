<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Upload File</title>

    <link rel="stylesheet"
          th:href="@{/css/style.css}">

</head>

<body>

<div class="container">

    <div class="card">

        <h2>
            Upload File
        </h2>

        <form th:action="@{/upload-file}"
              method="post"
              enctype="multipart/form-data">

            <div class="input-group">

                <label>
                    Select File
                </label>

                <input type="file"
                       name="file"
                       required>

            </div>

            <button type="submit"
                    class="btn">

                Upload File

            </button>

        </form>

    </div>

</div>

</body>

</html>
