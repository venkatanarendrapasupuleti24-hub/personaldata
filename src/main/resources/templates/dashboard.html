<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Dashboard</title>

    <link rel="stylesheet"
          th:href="@{/css/style.css}">

</head>

<body>

<div class="container">

    <div class="dashboard-wrapper">

        <h1 class="dashboard-title">
            SmartVault Dashboard
        </h1>

        <p class="dashboard-subtitle">

            Manage your expenses,
            files and financial data securely.

        </p>

        <div class="dashboard-grid">

            <!-- ADD EXPENSE -->

            <div class="dashboard-card">

                <h3>
                    Add Expense
                </h3>

                <p>
                    Add and manage your
                    daily expenses.
                </p>

                <a href="/add-expense">

                    Open

                </a>

            </div>

            <!-- VIEW EXPENSES -->

            <div class="dashboard-card">

                <h3>
                    View Expenses
                </h3>

                <p>
                    View all saved
                    expense records.
                </p>

                <a href="/expenses">

                    Open

                </a>

            </div>

            <!-- UPLOAD FILE -->

            <div class="dashboard-card">

                <h3>
                    Upload File
                </h3>

                <p>
                    Securely upload
                    important files.
                </p>

                <a href="/upload">

                    Open

                </a>

            </div>

            <!-- VIEW FILES -->

            <div class="dashboard-card">

                <h3>
                    View Files
                </h3>

                <p>
                    Access uploaded
                    files anytime.
                </p>

                <a href="/files">

                    Open

                </a>

            </div>

        </div>

    </div>

</div>

</body>

</html>
