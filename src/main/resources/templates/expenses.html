<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Expenses</title>

    <link rel="stylesheet"
          th:href="@{/css/style.css}">

</head>

<body>

<h2>Expense List</h2>

<table border="1">

    <tr>

        <th>Title</th>

        <th>Amount</th>

        <th>Category</th>

    </tr>

    <tr th:each="expense : ${expenses}">

        <td th:text="${expense.title}"></td>

        <td th:text="${expense.amount}"></td>

        <td th:text="${expense.category}"></td>

    </tr>

</table>

</body>

</html>
